<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آزمون آنلاین رض</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* استایل‌های اضافی یا اصلاحی در صورت نیاز */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 600px;
            width: 90%;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 15px;
            text-align: right;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"], input[type="number"] {
            width: calc(100% - 20px);
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            background-color: #3498db;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 18px;
            margin-top: 10px;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #2980b9;
        }
        .question-block {
            margin-top: 20px;
            background-color: #ecf0f1;
            padding: 20px;
            border-radius: 6px;
            text-align: right;
        }
        .options label {
            display: block;
            background-color: #fdfdfd;
            border: 1px solid #e0e0e0;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        .options label:hover {
            background-color: #f0f0f0;
        }
        .options input[type="radio"] {
            margin-left: 10px;
        }
        .results-display {
            margin-top: 30px;
            font-size: 1.2em;
            color: #27ae60;
        }
        #debug-log {
            margin-top: 30px;
            height: 150px;
            overflow-y: scroll;
            background-color: #333;
            color: #0f0;
            padding: 10px;
            border-radius: 5px;
            text-align: left;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9em;
            direction: ltr; /* لاگ‌ها انگلیسی هستن */
        }
        #debug-log p {
            margin: 5px 0;
        }
        /* استایل برای دکمه تست اتصال */
        .test-connection-button {
            background-color: #f39c12;
            margin-top: 20px;
        }
        .test-connection-button:hover {
            background-color: #e67e22;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>سامانه آزمون آنلاین</h1>

        <div id="login-form">
            <div class="input-group">
                <label for="student-name">نام و نام خانوادگی:</label>
                <input type="text" id="student-name" placeholder="مثال: رضا احمدی">
            </div>
            <div class="input-group">
                <label for="student-id">شماره دانشجویی:</label>
                <input type="text" id="student-id" placeholder="مثال: 987654321">
            </div>
            <button id="start-quiz-button">شروع آزمون</button>
            <button class="test-connection-button" id="test-connection-button">تست اتصال به Google Sheet</button>
        </div>

        <div id="quiz-area" style="display: none;">
            <h2 id="question-title"></h2>
            <div id="question-options" class="options">
                <!-- Radio buttons will be generated here -->
            </div>
            <button id="next-question-button">سوال بعدی</button>
            <button id="submit-quiz-button" style="display: none;">اتمام آزمون</button>
        </div>

        <div id="results-area" class="results-display" style="display: none;">
            <!-- Results will be shown here -->
        </div>

        <div id="debug-log">
            <h3>لاگ‌های دیباگ:</h3>
            <!-- Debug messages will appear here -->
        </div>
    </div>

    <script>
        // --- Global Variables ---
        let currentQuestionIndex = 0;
        let score = 0;
        let selectedAnswerIndex = null;
        let studentName = "";
        let studentId = "";
        let userIp = "127.0.0.1"; // IP ثابت در صورت بروز خطا یا برای تست
        let studentData = {}; // To store all student data before sending

        // <<<--- !!! مهم: این URL را با URL نهایی Web App خود در Google Apps Script جایگزین کنید !!! --->>>
        const SHEET_URL = "https://script.google.com/macros/s/AKfycbwmpqRfCtQznj1rPYtt4J6klyURJ_6tE8OifiMbIswWe_dmav94iwnEVafYS5jyGxiUbw/exec"; // <<<--- URL به روز رسانی شد

        // --- Sample Questions (replace with your actual questions) ---
        const questions = [
            {
                question: "پایتخت ایران کجاست؟",
                options: ["اصفهان", "تهران", "شیراز", "تبریز"],
                answer: 1 // Index of the correct answer (0-based)
            },
            {
                question: "بزرگترین اقیانوس جهان کدام است؟",
                options: ["اطلس", "هند", "آرام", "منجمد شمالی"],
                answer: 2
            },
            {
                question: "واحد پول ژاپن چیست؟",
                options: ["دلار", "یورو", "ین", "پوند"],
                answer: 2
            }
            // Add more questions here...
        ];

        // --- Functions ---

        // Function to log messages to the debug console
        function log(message) {
            const debugLog = document.getElementById('debug-log');
            const p = document.createElement('p');
            p.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            debugLog.appendChild(p);
            // Scroll to the bottom
            debugLog.scrollTop = debugLog.scrollHeight;
        }

        // Function to handle the "Test Connection" button click
        function testConnection() {
            log("Testing connection to Google Sheet...");
            fetch(SHEET_URL, {
                method: 'POST',
                mode: 'cors', // Important for cross-origin requests
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    action: "testConnection",
                    timestamp: new Date().toISOString()
                })
            })
            .then(response => {
                if (!response.ok) {
                    // Try to get error message from response body if possible
                    return response.text().then(text => { throw new Error(`HTTP error! status: ${response.status}, message: ${text}`) });
                }
                return response.json();
            })
            .then(data => {
                log("Connection test response: " + JSON.stringify(data));
                if (data.message === "success") {
                    log("Google Sheet connection successful!");
                } else {
                    log("Google Sheet connection failed. Response: " + JSON.stringify(data));
                }
            })
            .catch(error => {
                log(`Error during connection test: ${error.message}`);
            });
        }

        // Function to send quiz data to Google Sheets
        function sendDataToSheet() {
            log("Submitting quiz data...");
            studentData = {
                name: studentName,
                id: studentId,
                ip: userIp, // Using the static IP
                score: score,
                totalQuestions: questions.length,
                timestamp: new Date().toISOString()
            };

            fetch(SHEET_URL, {
                method: 'POST',
                mode: 'cors',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(studentData)
            })
            .then(response => {
                if (!response.ok) {
                     return response.text().then(text => { throw new Error(`HTTP error! status: ${response.status}, message: ${text}`) });
                }
                return response.json();
            })
            .then(data => {
                log("Quiz submission response: " + JSON.stringify(data));
                if (data.message === "success") {
                    log("Quiz submitted successfully!");
                    displayResults();
                } else {
                    log("Quiz submission failed. Response: " + JSON.stringify(data));
                    // Optionally display an error message to the user
                }
            })
            .catch(error => {
                log(`Error submitting quiz: ${error.message}`);
                // Optionally display an error message to the user
            });
        }

        // Function to display results
        function displayResults() {
            const resultsArea = document.getElementById('results-area');
            resultsArea.innerHTML = `امتیاز شما: ${score} از ${questions.length}`;
            resultsArea.style.display = 'block';
            document.getElementById('quiz-area').style.display = 'none';
        }

        // Function to load a question
        function loadQuestion() {
            const questionTitle = document.getElementById('question-title');
            const optionsDiv = document.getElementById('question-options');
            const nextButton = document.getElementById('next-question-button');
            const submitButton = document.getElementById('submit-quiz-button');

            if (currentQuestionIndex < questions.length) {
                const currentQuestion = questions[currentQuestionIndex];
                questionTitle.textContent = `${currentQuestionIndex + 1}. ${currentQuestion.question}`;
                optionsDiv.innerHTML = ''; // Clear previous options

                currentQuestion.options.forEach((option, index) => {
                    const label = document.createElement('label');
                    const radio = document.createElement('input');
                    radio.type = 'radio';
                    radio.name = 'answer';
                    radio.value = index;
                    radio.dataset.questionIndex = currentQuestionIndex; // Store question index

                    label.appendChild(radio);
                    label.appendChild(document.createTextNode(option));
                    optionsDiv.appendChild(label);

                    // Add event listener to handle answer selection
                    radio.addEventListener('change', () => {
                        selectedAnswerIndex = index;
                        log(`Answer selected for question ${currentQuestionIndex + 1}: ${option}`);
                    });
                });

                // Show next button, hide submit button
                nextButton.style.display = 'inline-block';
                submitButton.style.display = 'none';
                log(`Loaded question ${currentQuestionIndex + 1}`);

            } else {
                // All questions answered, show submit button
                questionTitle.textContent = "آزمون شما به پایان رسید.";
                optionsDiv.innerHTML = '';
                nextButton.style.display = 'none';
                submitButton.style.display = 'inline-block';
                log("All questions loaded.");
            }
        }

        // Function to handle moving to the next question or submitting
        function handleNextOrSubmit() {
            const submitButton = document.getElementById('submit-quiz-button');

            if (submitButton.style.display === 'inline-block') {
                // If submit button is visible, it means we are done with questions
                sendDataToSheet();
            } else {
                // Otherwise, move to the next question
                if (selectedAnswerIndex !== null) {
                    const correctAnswerIndex = questions[currentQuestionIndex].answer;
                    if (selectedAnswerIndex === correctAnswerIndex) {
                        score++;
                        log(`Correct answer for question ${currentQuestionIndex + 1}. Score: ${score}`);
                    } else {
                        log(`Incorrect answer for question ${currentQuestionIndex + 1}. Correct was: ${questions[currentQuestionIndex].options[correctAnswerIndex]}`);
                    }
                    selectedAnswerIndex = null; // Reset for next question
                    currentQuestionIndex++;
                    loadQuestion();
                } else {
                    alert("لطفاً یک گزینه را انتخاب کنید.");
                    log("Attempted to proceed without selecting an answer.");
                }
            }
        }

        // Function to initialize the quiz
        function initializeQuiz() {
            log("Initializing quiz...");
            const loginForm = document.getElementById('login-form');
            const quizArea = document.getElementById('quiz-area');

            document.getElementById('start-quiz-button').addEventListener('click', () => {
                studentName = document.getElementById('student-name').value.trim();
                studentId = document.getElementById('student-id').value.trim();

                if (studentName && studentId) {
                    log(`Starting quiz for ${studentName} (ID: ${studentId})`);
                    loginForm.style.display = 'none';
                    quizArea.style.display = 'block';
                    loadQuestion();
                } else {
                    alert("لطفاً نام و شماره دانشجویی خود را وارد کنید.");
                    log("Login failed: Missing name or ID.");
                }
            });

            document.getElementById('next-question-button').addEventListener('click', handleNextOrSubmit);
            submitButton.addEventListener('click', handleNextOrSubmit); // Submit button also uses handleNextOrSubmit

            document.getElementById('test-connection-button').addEventListener('click', testConnection);

            log("Quiz initialized.");
        }

        // --- Event Listeners ---
        // Initialize the quiz when the window loads
        window.onload = initializeQuiz;

        // --- Anti-Cheat Mechanism (Basic) ---
        // Detect if the user leaves the tab
        let hidden;
        let visibilityChange;
        if (typeof document.hidden !== "undefined") {
            hidden = "hidden";
            visibilityChange = "visibilitychange";
        } else if (typeof document.msHidden !== "undefined") {
            hidden = "msHidden";
            visibilityChange = "msvisibilitychange";
        } else if (typeof document.webkitHidden !== "undefined") {
            hidden = "webkitHidden";
            visibilityChange = "webkitvisibilitychange";
        }

        if (hidden && visibilityChange) {
            document.addEventListener(visibilityChange, function() {
                if (document[hidden]) {
                    log("User left the quiz tab!");
                    // You could potentially submit the quiz here automatically
                    // sendDataToSheet();
                    // alert("You left the quiz tab. Your progress might be lost or submitted.");
                } else {
                    log("User returned to the quiz tab.");
                }
            }, false);
        }

        // Handle beforeunload event (e.g., if user tries to close the tab/window)
        window.addEventListener('beforeunload', function (e) {
            // Check if the quiz is in progress and not yet submitted
            if (quizArea.style.display === 'block' && currentQuestionIndex < questions.length) {
                 // Cancel the event
                e.preventDefault();
                 // Chrome requires returnValue to be set
                e.returnValue = '';
                log("User attempting to leave the page during the quiz.");
                // Optionally, you could send partial data here, but be careful with user experience.
                // sendDataToSheet(); // Uncomment with caution
            }
        });

    </script>

</body>
</html>
